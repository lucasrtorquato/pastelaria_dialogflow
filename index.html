<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pastelaria do SENAI</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Dialogflow -->
  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

  <style>
    body {
      background: linear-gradient(135deg, #fff5e6, #ffe0b3);
      font-family: Arial, sans-serif;
    }

    header {
      background-color: #ff6600;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .card img {
      height: 200px;
      object-fit: cover;
    }

    .card:hover {
      transform: scale(1.05);
      transition: 0.3s;
    }

    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 40px;
    }

    df-messenger {
      --df-messenger-button-titlebar-color: #ff6600;
      --df-messenger-chat-background-color: #fff;
      --df-messenger-font-color: black;
      --df-messenger-user-message: #ffcc80;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>🥟 Pastelaria do SENAI</h1>
    <p>Sabores incríveis feitos na hora!</p>
  </header>

  <!-- CONTEÚDO -->
  <div class="container mt-5">

    <h2 class="text-center mb-4">Nosso Cardápio</h2>

    <div class="row">

      <!-- Pastel de Carne -->
      <div class="col-md-4">
        <div class="card shadow">
          <img src="pastel1.webp" class="card-img-top">
          <div class="card-body text-center">
            <h5 class="card-title">Pastel de Carne</h5>
            <p class="card-text">R$ 10,00</p>
          </div>
        </div>
      </div>

      <!-- Pastel de Queijo -->
      <div class="col-md-4">
        <div class="card shadow">
          <img src="pastel2.jpg" class="card-img-top">
          <div class="card-body text-center">
            <h5 class="card-title">Pastel de Queijo</h5>
            <p class="card-text">R$ 9,00</p>
          </div>
        </div>
      </div>

      <!-- Pastel de Frango -->
      <div class="col-md-4">
        <div class="card shadow">
          <img src="pastel3.jpeg" class="card-img-top">
          <div class="card-body text-center">
            <h5 class="card-title">Pastel de Frango</h5>
            <p class="card-text">R$ 11,00</p>
          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- RODAPÉ -->
  <footer>
    <p>© 2026 Pastelaria do SENAI</p>
  </footer>

  <!-- BOT (mantido) -->
  <df-messenger
    intent="WELCOME"
    chat-title="AulaBot"
    agent-id="ca063fb4-dd06-4961-bce6-6f9d899ef63a"
    language-code="pt-br">
  </df-messenger>

</body>
</html>
